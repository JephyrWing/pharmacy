<!DOCTYPE HTML>
<html>
<head>
  <meta charset="UTF-8">
  <title>Pharmacy Recommendation System</title>
  
  <!--부트스트랩 css 추가-->
  <link rel="stylesheet" href="/css/bootstrap.min.css">
  
  <style>
    .grid-image {
      display: flex;
      justify-content: center;
    }
    
    img {
      margin: 20px 0 20px;
      width: 50%;
      height: 450px;
    }
  </style>
</head>
<body>
<div>
  <div>
    <div class="container">
      <div>
        <h2>Pharmacy Recommendation</h2>
      </div>
      <div class="body">
        <form action="/search" method="post">
          <div>
            <label for="address_kakao">주소를 입력하시면 주소 기준으로 가까운 약국의 위치 최대 3곳 추천드립니다.</label>
            <input type="text" class="form-control" id="address_kakao" name="address"
                   placeholder="주소(지번 또는 도로명)를 입력하세요. ex) 서울특별시 성북구 종암로 10길" readonly>
            <input type="hidden" name="x">
            <input type="hidden" name="y">
          </div>
          <div>
            <button type="submit" class="btn btn-primary" id="btn-save">Search</button>
          </div>
        </form>
      </div>
      <div class="grid-image">
        <div id="map" style="width:100%;height:350px;"></div>
        <img src="/images/road.png" alt="road" class="img-responsive img-rounded">
      </div>
    </div>
  </div>
</div>

<!--부트스트랩 js, jquery 추가-->
<script src="/js/bootstrap.min.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", function () {
    const addressInput = document.getElementById("address_kakao");
    const xInput = document.getElementsByName("x");
    const yInput = document.getElementsByName("y");
    addressInput.addEventListener("click", function () {
      new kakao.Postcode({
        oncomplete: function (data) {
          //console.log(data);
          addressInput.value = data.address;
          xInput.value = data.x;
          yInput.value = data.y;
        }
      }).open();
    })
  })
</script>
<script src="//t1.kakaocdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
<script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=7c5ea14218a90d603f0617ab1ab5927e"></script>
<script>
  // 위치 정보 지원 여부 확인
  let mapContainer = document.getElementById('map'), // 지도를 표시할 div
      mapOption = {
        center: new kakao.maps.LatLng(37.2769375834208, 127.027515054417), // 지도의 중심좌표
        level: 3 // 지도의 확대 레벨
      };
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
        (position) => {
          // 성공 시
          const latitude = position.coords.latitude;   // 위도
          const longitude = position.coords.longitude; // 경도
          console.log(`위도: ${latitude}, 경도: ${longitude}`);
          mapOption = {
            center: new kakao.maps.LatLng(latitude, longitude), // 지도의 중심좌표
            level: 3 // 지도의 확대 레벨
          };
          
        },
        (error) => {
          // 실패 시 (권한 거부 등)
          console.error("위치 정보를 가져올 수 없습니다: ", error.message);
        },
        {
          enableHighAccuracy: true, // GPS를 우선하여 높은 정확도 요청
          timeout: 5000,            // 타임아웃 제한 (밀리초 단위)
          maximumAge: 0             // 캐시된 위치 대신 새로운 위치를 갱신하여 가져옴
        }
    );
  } else {
    console.error("이 브라우저는 Geolocation API를 지원하지 않습니다.");
  }
  
  // 지도를 표시할 div와  지도 옵션으로  지도를 생성합니다
  let map = new kakao.maps.Map(mapContainer, mapOption);
  
  // 마커가 표시될 위치입니다
  let markerPosition  = new kakao.maps.LatLng(33.450701, 126.570667);
  
  // 마커를 생성합니다
  let marker = new kakao.maps.Marker({
    position: markerPosition
  });
  
  // 마커가 지도 위에 표시되도록 설정합니다
  marker.setMap(map);
</script>
</body>
</html>
